<t t-name="website_studio.mapa-londrina-bairros">

      <style>
        #mapa-londrina-bairros-app {
          font-family: Arial, sans-serif;
          background: #f3f6f9;
          padding: 30px 15px;
          color: #1f2937;
        }

        .ml-container {
          max-width: 1350px;
          margin: 0 auto;
        }

        .ml-header {
          text-align: center;
          margin-bottom: 25px;
        }

        .ml-header h1 {
          font-size: 34px;
          font-weight: 900;
          margin: 0 0 8px;
          color: #111827;
        }

        .ml-header p {
          color: #6b7280;
          margin: 0;
        }

        .ml-layout {
          display: grid;
          grid-template-columns: 1.4fr 0.8fr;
          gap: 24px;
        }

        .ml-card {
          background: #fff;
          border-radius: 22px;
          padding: 22px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .ml-map-box {
          width: 100%;
          overflow: auto;
          border-radius: 18px;
          background: #ffffff;
          border: 1px solid #e5e7eb;
        }

        svg {
          width: 100%;
          height: auto;
          min-width: 780px;
        }

        .bairro {
          stroke: #111827;
          stroke-width: 1.2;
          cursor: pointer;
          transition: 0.25s ease;
        }

        .bairro:hover {
          filter: brightness(1.08);
          stroke-width: 3;
        }

        .bairro.active {
          stroke: #000;
          stroke-width: 4;
          filter: brightness(1.12);
        }

        .label-bairro {
          pointer-events: none;
          font-size: 12px;
          font-weight: 700;
          fill: #111827;
          text-anchor: middle;
          dominant-baseline: middle;
        }

        .label-regiao {
          pointer-events: none;
          font-size: 22px;
          font-weight: 900;
          fill: rgba(120, 40, 90, 0.45);
          text-anchor: middle;
          dominant-baseline: middle;
        }

        .regiao-norte {
          fill: #fff200;
        }

        .regiao-oeste {
          fill: #00e88a;
        }

        .regiao-central {
          fill: #ffffff;
        }

        .regiao-leste {
          fill: #8beef2;
        }

        .regiao-sul {
          fill: #fff68a;
        }

        .ml-side-title {
          font-size: 23px;
          font-weight: 900;
          margin-bottom: 6px;
        }

        .ml-selected {
          color: #6b7280;
          font-size: 14px;
          margin-bottom: 16px;
        }

        .ml-search {
          width: 100%;
          padding: 12px 14px;
          border-radius: 14px;
          border: 1px solid #d1d5db;
          margin-bottom: 14px;
          font-size: 15px;
        }

        .ml-filter-area {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-bottom: 18px;
        }

        .ml-filter-btn {
          border: none;
          border-radius: 999px;
          padding: 8px 13px;
          font-size: 13px;
          font-weight: 800;
          cursor: pointer;
          background: #e5e7eb;
          color: #111827;
        }

        .ml-filter-btn.active,
        .ml-filter-btn:hover {
          background: #111827;
          color: white;
        }

        .ml-list {
          display: flex;
          flex-direction: column;
          gap: 12px;
          max-height: 600px;
          overflow-y: auto;
          padding-right: 5px;
        }

        .ml-person {
          border: 1px solid #e5e7eb;
          border-radius: 16px;
          padding: 14px;
          background: #ffffff;
        }

        .ml-person h3 {
          margin: 0 0 7px;
          font-size: 17px;
          font-weight: 900;
        }

        .ml-tag {
          display: inline-block;
          background: #eef2ff;
          color: #3730a3;
          font-size: 12px;
          font-weight: 800;
          border-radius: 999px;
          padding: 4px 9px;
          margin: 2px 3px 7px 0;
        }

        .ml-person p {
          font-size: 14px;
          color: #4b5563;
          margin: 5px 0;
        }

        .ml-empty {
          padding: 20px;
          border-radius: 16px;
          border: 1px dashed #d1d5db;
          color: #6b7280;
          text-align: center;
          background: #f9fafb;
        }

        @media (max-width: 1000px) {
          .ml-layout {
            grid-template-columns: 1fr;
          }
        }
      </style>

                  t-att-data-regiao="(item.x_studio_regiao or '').upper()"
                  t-att-data-bairro="(item.x_studio_bairro or '').upper()"
                  t-att-data-search="('%s %s %s %s %s' % (
                    item.x_name or '',
                    item.x_studio_regiao or '',
                    item.x_studio_bairro or '',
                    item.x_studio_caracteristicas or '',
                    item.x_studio_observacoes or ''
                  )).lower()"
                >

                  <h3>
                    <t t-esc="item.x_name"/>
                  </h3>

                  <span class="ml-tag">
                    <t t-esc="item.x_studio_regiao"/>
                  </span>

                  <span class="ml-tag">
                    <t t-esc="item.x_studio_bairro"/>
                  </span>

                  <p>
                    <strong>Responsável:</strong>
                    <t t-esc="item.x_studio_responsavel"/>
                  </p>

                  <p>
                    <strong>Características:</strong>
                    <t t-esc="item.x_studio_caracteristicas"/>
                  </p>

                  <p>
                    <strong>Observações:</strong>
                    <t t-esc="item.x_studio_observacoes"/>
                  </p>

      <script>
        document.addEventListener("DOMContentLoaded", function () {
          const bairros = document.querySelectorAll(".bairro");
          const buttons = document.querySelectorAll(".ml-filter-btn");
          const cards = document.querySelectorAll(".ml-person");
          const searchInput = document.getElementById("ml-search");
          const selected = document.getElementById("ml-selected");
          const list = document.getElementById("ml-list");

          let filtroRegiao = "TODOS";
          let filtroBairro = "TODOS";

          function normalize(text) {
            return String(text || "")
              .toUpperCase()
              .normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "");
          }

          function aplicarFiltro() {
            const busca = normalize(searchInput.value);
            let visiveis = 0;

            cards.forEach(function (card) {
              const cardRegiao = normalize(card.dataset.regiao);
              const cardBairro = normalize(card.dataset.bairro);
              const cardSearch = normalize(card.dataset.search || card.textContent);

              const matchRegiao = filtroRegiao === "TODOS" || cardRegiao === normalize(filtroRegiao);
              const matchBairro = filtroBairro === "TODOS" || cardBairro === normalize(filtroBairro);
              const matchBusca = !busca || cardSearch.includes(busca);

              if (matchRegiao && matchBairro && matchBusca) {
                card.style.display = "block";
                visiveis++;
              } else {
                card.style.display = "none";
              }
            });

            let empty = document.getElementById("ml-empty");

            if (visiveis === 0) {
              if (!empty) {
                empty = document.createElement("div");
                empty.id = "ml-empty";
                empty.className = "ml-empty";
                empty.textContent = "Nenhuma liderança encontrada para esse filtro.";
                list.appendChild(empty);
              }
            } else {
              if (empty) {
                empty.remove();
              }
            }
          }

          function limparBairrosAtivos() {
            bairros.forEach(function (b) {
              b.classList.remove("active");
            });
          }

          function limparBotoesAtivos() {
            buttons.forEach(function (btn) {
              btn.classList.remove("active");
            });
          }

          bairros.forEach(function (bairro) {
            bairro.addEventListener("click", function () {
              filtroRegiao = bairro.dataset.regiao;
              filtroBairro = bairro.dataset.bairro;

              limparBairrosAtivos();
              limparBotoesAtivos();

              bairro.classList.add("active");

              selected.textContent = "Selecionado: " + filtroBairro + " | Região " + filtroRegiao;

              aplicarFiltro();
            });
          });

          buttons.forEach(function (button) {
            button.addEventListener("click", function () {
              filtroRegiao = button.dataset.regiao;
              filtroBairro = "TODOS";

              limparBairrosAtivos();
              limparBotoesAtivos();

              button.classList.add("active");

              if (filtroRegiao === "TODOS") {
                selected.textContent = "Exibindo todas as regiões e bairros.";
              } else {
                selected.textContent = "Região selecionada: " + filtroRegiao;
              }

              aplicarFiltro();
            });
          });

          searchInput.addEventListener("input", aplicarFiltro);

          aplicarFiltro();
        });
      </script>

    </div>

  </t>
